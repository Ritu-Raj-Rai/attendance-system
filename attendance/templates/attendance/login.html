{% extends 'attendance/base.html' %}

{% block title %}Login{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 0;
    }

    .auth-card {
        width: 100%;
        max-width: 450px;
        padding: 3.5rem 2.5rem;
        text-align: center;
    }

    .auth-logo {
        font-size: 3.5rem;
        background: var(--gradient-neon);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 1.5rem;
        animation: float 4s ease-in-out infinite;
    }

    .auth-card h2 {
        font-weight: 800;
        letter-spacing: -1px;
        margin-bottom: 0.5rem;
    }

    .form-floating > .form-control,
    .form-floating > .form-control:focus {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-glass);
        color: var(--text-main);
        border-radius: 12px;
    }

    .form-floating > label {
        color: var(--text-muted);
    }

    .form-floating > .form-control:focus ~ label {
        color: var(--accent-cyan);
    }

    .auth-btn {
        width: 100%;
        padding: 1rem;
        font-size: 1.1rem;
        margin-top: 1.5rem;
    }

    .auth-footer {
        margin-top: 2rem;
        color: var(--text-muted);
    }

    .auth-footer a {
        color: var(--accent-cyan);
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card">
        <div class="auth-logo">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h2>Welcome Back</h2>
        <p class="text-muted mb-5">Sign in to access your portal</p>

        <form method="POST">
            {% csrf_token %}
            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control" id="id_username" placeholder="Username" required>
                <label for="id_username">Username</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" name="password" class="form-control" id="id_password" placeholder="Password" required>
                <label for="id_password">Password</label>
            </div>

            <button type="submit" class="btn-premium auth-btn">
                Sign In <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Create one now</a>
        </div>
    </div>
</div>
{% endblock %}
